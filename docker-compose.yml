services:
  auth:
    build:
      context: .
      dockerfile: Dockerfile.auth
    ports:
      - "9001:9001"
    environment:
      DATABASE_URL: postgres://budgetgen:budgetgen@postgres:5432/budgetgen?sslmode=disable
      JWT_SECRET: change-this-secret-in-production
      AUTH_PORT: 9001
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  core:
    build:
      context: .
      dockerfile: Dockerfile.core
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: postgres://budgetgen:budgetgen@postgres:5432/budgetgen?sslmode=disable
      JWT_SECRET: change-this-secret-in-production
      CORE_PORT: 9000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: budgetgen
      POSTGRES_PASSWORD: budgetgen
      POSTGRES_DB: budgetgen
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budgetgen"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
